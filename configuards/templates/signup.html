<!DOCTYPE html>
<html>
<head>
    <title>Sign Up - Configuards</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="card">
        <h2>Create Your <span class="highlight">CONFIGUARDS</span> Account</h2>
        {% if error %}
            <p class="error">{{ error }}</p>
        {% endif %}
        <form method="POST">
            <input type="text" name="fullname" placeholder="Full Name" required>
            <input type="tel" name="mobile" placeholder="Mobile Number" required>
            <div style="position: relative;">
                <input type="email" name="email" placeholder="Email Address" required style="padding-right: 40px;">
                <i class="fa fa-envelope" style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); color: #667eea;"></i>
            </div>
            <input type="text" name="aws_builder_id" placeholder="AWS Builder ID" required>
            <div style="position: relative;">
                <input type="password" id="password" name="password" placeholder="Password" required>
                <i id="toggleIcon1" onclick="togglePassword('password', 'toggleIcon1')" class="fa fa-eye" style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #667eea;"></i>
            </div>
            <div style="position: relative;">
                <input type="password" id="confirm_password" name="confirm_password" placeholder="Confirm Password" required>
                <i id="toggleIcon2" onclick="togglePassword('confirm_password', 'toggleIcon2')" class="fa fa-eye" style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #667eea;"></i>
            </div>
            <button type="submit">Sign Up</button>
        </form>
        <p>Already have an account? <a href="{{ url_for('login') }}">Login here</a></p>
    </div>
    <script>
        function togglePassword(id, iconId) {
            const pwd = document.getElementById(id);
            const icon = document.getElementById(iconId);
            if (pwd.type === 'password') {
                pwd.type = 'text';
                icon.className = 'fa fa-eye-slash';
            } else {
                pwd.type = 'password';
                icon.className = 'fa fa-eye';
            }
        }
    </script>
</body>
</html>
