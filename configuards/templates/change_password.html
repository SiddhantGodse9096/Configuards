<!DOCTYPE html>
<html>
<head>
    <title>Change Password - Configuards</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand"><a href="{{ url_for('dashboard') }}" style="color: white; text-decoration: none;">← &nbsp;&nbsp;CONFIGUARDS</a></div>
        <div class="nav-menu">
            <a href="{{ url_for('dashboard') }}" class="nav-link">Dashboard</a>
            <a href="{{ url_for('findings') }}" class="nav-link">Findings</a>
            <a href="{{ url_for('reports') }}" class="nav-link">Reports</a>
            <a href="{{ url_for('feedback') }}" class="nav-link">Feedback</a>
        </div>
        <div class="nav-user">
            <div class="profile-pic">{{ user[0]|upper }}</div>
            <span>{{ user }}</span>
            <div class="dropdown">
                <button class="dropdown-btn">▼</button>
                <div class="dropdown-content">
                    <a href="{{ url_for('profile') }}">Profile</a>
                    <a href="{{ url_for('about') }}">About Our Services</a>
                    <a href="{{ url_for('settings') }}">Settings</a>
                    <a href="{{ url_for('logout') }}">Logout</a>
                </div>
            </div>
        </div>
    </nav>
    
    <div class="dashboard-container">
        <div class="profile-content">
            <h2><span class="highlight">Change Password</span></h2>
            {% if error %}
                <p class="error">{{ error }}</p>
            {% endif %}
            {% if success %}
                <p style="color: #155724; background: #d4edda; padding: 10px; border-radius: 8px; font-weight: bold;">{{ success }}</p>
            {% endif %}
            <form method="POST">
                <div style="position: relative;">
                    <input type="password" id="current_password" name="current_password" placeholder="Current Password" required>
                    <i id="toggleIcon1" onclick="togglePassword('current_password', 'toggleIcon1')" class="fa fa-eye" style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #667eea;"></i>
                </div>
                <div style="position: relative;">
                    <input type="password" id="new_password" name="new_password" placeholder="New Password" required>
                    <i id="toggleIcon2" onclick="togglePassword('new_password', 'toggleIcon2')" class="fa fa-eye" style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #667eea;"></i>
                </div>
                <div style="position: relative;">
                    <input type="password" id="confirm_password" name="confirm_password" placeholder="Confirm New Password" required>
                    <i id="toggleIcon3" onclick="togglePassword('confirm_password', 'toggleIcon3')" class="fa fa-eye" style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #667eea;"></i>
                </div>
                <button type="submit">Change Password</button>
            </form>
            <p><a href="{{ url_for('settings') }}">Back to Settings</a></p>
        </div>
    </div>

    <script>
        function togglePassword(id, iconId) {
            const pwd = document.getElementById(id);
            const icon = document.getElementById(iconId);
            if (pwd.type === 'password') {
                pwd.type = 'text';
                icon.className = 'fa fa-eye-slash';
            } else {
                pwd.type = 'password';
                icon.className = 'fa fa-eye';
            }
        }

        document.addEventListener('DOMContentLoaded', function() {
            const dropdownBtn = document.querySelector('.dropdown-btn');
            const dropdownContent = document.querySelector('.dropdown-content');
            
            dropdownBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                dropdownContent.style.display = dropdownContent.style.display === 'block' ? 'none' : 'block';
            });
            
            document.addEventListener('click', function(e) {
                if (!e.target.closest('.dropdown')) {
                    dropdownContent.style.display = 'none';
                }
            });
        });
    </script>
</body>
</html>
