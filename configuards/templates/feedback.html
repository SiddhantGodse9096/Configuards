<!DOCTYPE html>
<html>
<head>
    <title>Feedback - Configuards</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand"><a href="{{ url_for('dashboard') }}" style="color: white; text-decoration: none;">← &nbsp;&nbsp;CONFIGUARDS</a></div>
        <div class="nav-menu">
            <a href="{{ url_for('dashboard') }}" class="nav-link">Dashboard</a>
            <a href="{{ url_for('findings') }}" class="nav-link">Findings</a>
            <a href="{{ url_for('reports') }}" class="nav-link">Reports</a>
            <a href="{{ url_for('feedback') }}" class="nav-link active">Feedback</a>
        </div>
        <div class="nav-user">
            <div class="profile-pic">{{ user[0]|upper }}</div>
            <span>{{ user }}</span>
            <div class="dropdown">
                <button class="dropdown-btn">▼</button>
                <div class="dropdown-content">
                    <a href="{{ url_for('profile') }}">Profile</a>
                    <a href="{{ url_for('about') }}">About Our Services</a>
                    <a href="{{ url_for('settings') }}">Settings</a>
                    <a href="{{ url_for('logout') }}">Logout</a>
                </div>
            </div>
        </div>
    </nav>
    
    <div class="card">
        <h2>Share Your <span class="highlight">Feedback</span></h2>
        {% if success %}
            <p style="color: #155724; background: #d4edda; padding: 10px; border-radius: 8px;">{{ success }}</p>
        {% endif %}
        <form method="POST">
            <input type="text" name="subject" placeholder="Subject" required>
            <textarea name="message" placeholder="Your feedback..." rows="6" style="width: 100%; padding: 15px; margin: 12px 0; border-radius: 10px; border: 2px solid #e0e0e0; font-size: 16px; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; resize: vertical;" required></textarea>
            <select name="rating" style="width: 100%; padding: 15px; margin: 12px 0; border-radius: 10px; border: 2px solid #e0e0e0; font-size: 16px; box-sizing: border-box;" required>
                <option value="">Rate your experience</option>
                <option value="5">⭐⭐⭐⭐⭐ Excellent</option>
                <option value="4">⭐⭐⭐⭐ Good</option>
                <option value="3">⭐⭐⭐ Average</option>
                <option value="2">⭐⭐ Poor</option>
                <option value="1">⭐ Very Poor</option>
            </select>
            <button type="submit">Submit Feedback</button>
        </form>
    </div>
</body>
</html>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const dropdownBtn = document.querySelector('.dropdown-btn');
            const dropdownContent = document.querySelector('.dropdown-content');
            
            dropdownBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                dropdownContent.style.display = dropdownContent.style.display === 'block' ? 'none' : 'block';
            });
            
            document.addEventListener('click', function(e) {
                if (!e.target.closest('.dropdown')) {
                    dropdownContent.style.display = 'none';
                }
            });
        });
    </script>
